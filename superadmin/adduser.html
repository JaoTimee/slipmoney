<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการผู้ใช้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-[#1e2b4d] text-white flex flex-col h-full shrink-0 hidden md:flex">
        <div class="h-20 flex items-center px-8 mt-2">
            <h1 class="font-bold text-2xl tracking-wide">Logo</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="adduser.html" class="flex items-center gap-3 px-4 py-3 bg-[#2563eb] text-white rounded-lg transition text-[14px]">
                <i class="fas fa-users-cog w-5 text-center"></i> จัดการผู้ใช้
            </a>
        </nav>
        <div class="px-4 pb-10">
            <a href="../index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 text-white/80 hover:text-white rounded-lg transition text-[14px]">
                <i class="fas fa-sign-out-alt w-5 text-center"></i> ออกจากระบบ
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 px-8 flex justify-between items-center shrink-0">
            <h1 class="text-xl font-bold text-gray-800">จัดการผู้ใช้</h1>
             <a href="profile.html" class="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition border border-slate-100">
                <div class="w-8 h-8 rounded-full bg-orange-500 text-white font-bold flex items-center justify-center text-xs shadow-sm">KK</div>
                <div class="leading-tight">
                    <p class="text-[13px] font-bold text-slate-800">นายก กา</p>
                    <p class="text-[10px] text-slate-500">Super Admin</p>
                </div>
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-6 flex gap-4 items-center">
                <div class="relative flex-1">
                    <input type="text" placeholder="ค้นหาชื่อผู้ใช้" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-[14px] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                </div>
                <button onclick="openModal()" class="bg-[#2563eb] hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl text-[14px] font-medium transition flex items-center gap-2 shadow-md shadow-blue-200">
                    <i class="fas fa-plus"></i> เพิ่มผู้ใช้
                </button>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-[13px] text-left">
                        <thead class="bg-gray-50/50 border-b border-gray-100 text-gray-400 font-medium">
                            <tr>
                                <th class="px-6 py-4 text-center w-20">ลำดับ</th>
                                <th class="px-6 py-4">ชื่อ-นามสกุล</th>
                                <th class="px-6 py-4">Gmail</th>
                                <th class="px-6 py-4">Username</th>
                                <th class="px-6 py-4 text-center">การจัดการ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <script>
                                for(let i=1; i<=7; i++) {
                                    document.write(`
                                        <tr class="hover:bg-gray-50/50 transition">
                                            <td class="px-6 py-4 text-center text-gray-500">${i}</td>
                                            <td class="px-6 py-4 font-medium">XXXXXXXX</td>
                                            <td class="px-6 py-4 text-gray-500">XXXXXX</td>
                                            <td class="px-6 py-4 text-gray-500">XXXXXXXX</td>
                                            <td class="px-6 py-4 text-center">
                                                <button class="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-200 transition text-[12px] flex items-center gap-1 mx-auto">
                                                    <i class="fas fa-edit"></i> แก้ไข
                                                </button>
                                            </td>
                                        </tr>
                                    `);
                                }
                            </script>
                        </tbody>
                    </table>
                </div>
                <div class="p-6 border-t border-gray-50 flex justify-between items-center text-[12px] text-gray-400">
                    <p>แสดง 1 - 7 จาก 7 รายการ</p>
                    <div class="flex gap-2 items-center">
                        <button class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-lg hover:bg-gray-50"><i class="fas fa-chevron-left text-[10px]"></i></button>
                        <button class="w-8 h-8 flex items-center justify-center bg-blue-600 text-white rounded-lg shadow-sm">1</button>
                        <button class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-lg hover:bg-gray-50 text-gray-600">2</button>
                        <button class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-lg hover:bg-gray-50 text-gray-600">3</button>
                        <span class="px-1">...</span>
                        <button class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-lg hover:bg-gray-50 text-gray-600">16</button>
                        <button class="w-8 h-8 flex items-center justify-center border border-gray-100 rounded-lg hover:bg-gray-50"><i class="fas fa-chevron-right text-[10px]"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="userModal" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="p-8 relative">
                <button onclick="closeModal()" class="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition">
                    <i class="fas fa-times"></i>
                </button>

                <h3 class="text-2xl font-bold text-center text-gray-800 mb-8">เพิ่มผู้ใช้</h3>

                <form class="space-y-5">
                    <div>
                        <label class="block text-[14px] font-medium text-gray-700 mb-2">ชื่อ-นามสกุล</label>
                        <input type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-[14px] font-medium text-gray-700 mb-2">Gmail</label>
                        <input type="email" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-[14px] font-medium text-gray-700 mb-2">Username</label>
                        <input type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[14px] font-medium text-gray-700 mb-2">รหัสผ่าน</label>
                            <input type="password" placeholder="Enter your password here" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-[13px] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="block text-[14px] font-medium text-gray-700 mb-2">ยืนยันรหัสผ่าน</label>
                            <input type="password" placeholder="Confirm your password here" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-[13px] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                        </div>
                    </div>

                    <div class="flex gap-4 pt-6">
                        <button type="button" onclick="closeModal()" class="flex-1 py-3.5 bg-gray-300 hover:bg-gray-400 text-white font-medium rounded-xl transition">
                            ยกเลิก
                        </button>
                        <button type="submit" class="flex-1 py-3.5 bg-[#2563eb] hover:bg-blue-700 text-white font-medium rounded-xl transition shadow-lg shadow-blue-200">
                            บันทึก
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openModal() {
            const modal = document.getElementById('userModal');
            modal.classList.remove('hidden');
            // เพิ่ม Animation เล็กน้อย
            modal.querySelector('div').classList.add('scale-100', 'opacity-100');
        }

        function closeModal() {
            const modal = document.getElementById('userModal');
            modal.classList.add('hidden');
        }

        // ปิด Modal เมื่อคลิกพื้นหลัง
        window.onclick = function(event) {
            const modal = document.getElementById('userModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
