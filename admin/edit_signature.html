<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการลายเซ็น - ฉบับสมบูรณ์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-modal { animation: fadeIn 0.2s ease-out forwards; }
        .sig-option:checked + label { border-color: #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden text-slate-800">

   <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 z-50 w-64 md:w-56 bg-[#25396f] text-white flex flex-col h-full shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="h-16 md:h-20 flex items-center justify-between px-6 shrink-0 mt-2">
            <h1 class="font-bold text-white text-2xl tracking-wide hidden md:block">Logo</h1>
            <h1 class="font-bold text-white text-xl tracking-wide md:hidden">เมนู</h1>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white text-xl focus:outline-none">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto no-scrollbar px-4 space-y-2 mt-4">
            <a href="data.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 text-white/80 hover:text-white rounded-lg transition text-[13px]">
                <i class="fas fa-file-invoice-dollar w-5 text-center"></i> จัดการเงินเดือน
            </a>
             <a href="edit_signature.html" class="flex items-center gap-3 px-4 py-3 bg-[#2563eb] text-white rounded-lg transition text-[13px] font-medium shadow-md">
                <i class="fas fa-edit w-5 text-center"></i> จัดการลายเซ็น
            </a>
        </nav>

        <div class="px-4 pb-6 pt-4 shrink-0 border-t border-white/10 md:border-none">
            <a href="../index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 text-white/80 hover:text-white rounded-lg transition text-[13px]">
                <i class="fas fa-sign-out-alt w-5 text-center"></i> ออกจากระบบ
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="hidden md:flex h-16 bg-white border-b border-gray-200 px-6 py-4 justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-semibold text-gray-800">รายการสลิปเงินเดือน</h1>
            </div>
            <a href="profile.html" class="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition border border-slate-100">
                <div class="w-8 h-8 rounded-full bg-orange-500 text-white font-bold flex items-center justify-center text-xs shadow-sm">KK</div>
                <div class="leading-tight">
                    <p class="text-[13px] font-bold text-slate-800">นายก กา</p>
                    <p class="text-[10px] text-slate-500">Admin</p>
                </div>
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-5 border-b border-gray-50"><h2 class="font-bold text-slate-800">ตารางรายชื่อ</h2></div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[13px]">
                            <thead class="text-slate-400 bg-slate-50/50">
                                <tr>
                                    <th class="px-6 py-4 text-center">ชื่อ-สกุล</th>
                                    <th class="px-6 py-4 text-center">ตำแหน่ง</th>
                                    <th class="px-6 py-4 text-center">ลายเซ็นปัจจุบัน</th>
                                    <th class="px-6 py-4 text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr class="hover:bg-slate-50 transition">
                                    <td class="px-6 py-6 text-center font-medium">นาย ก ไก่</td>
                                    <td class="px-6 py-6 text-center text-slate-500">ผอ.กองช่าง</td>
                                    <td class="px-6 py-2 flex justify-center">
                                        <img id="sig-target-1" src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Signature_of_John_Hancock.svg" class="h-12 w-auto opacity-70 mix-blend-multiply transition-transform duration-300">
                                    </td>
                                    <td class="px-6 py-6 text-center">
                                        <button onclick="openModal('sig-target-1')" class="inline-flex items-center gap-1.5 px-4 py-2 border border-blue-400 text-blue-600 rounded-lg hover:bg-blue-50 transition text-[11px] font-medium">
                                            <i class="far fa-edit"></i> แก้ไขลายเซ็น
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col animate-modal">
            <div class="bg-[#1e2b4d] px-6 py-4 flex justify-between items-center">
                <h3 class="text-white font-bold"><i class="fas fa-pen-nib mr-2"></i> จัดการลายเซ็น</h3>
                <button onclick="closeModal()" class="text-white/60 hover:text-white transition"><i class="fas fa-times"></i></button>
            </div>

            <div class="flex border-b bg-slate-50">
                <button onclick="switchTab('saved')" id="tab-saved" class="flex-1 py-3 text-[12px] font-bold border-b-2 border-blue-600 text-blue-600 transition">บันทึกไว้</button>
                <button onclick="switchTab('draw')" id="tab-draw" class="flex-1 py-3 text-[12px] font-medium text-slate-400 transition">วาดใหม่</button>
                <button onclick="switchTab('upload')" id="tab-upload" class="flex-1 py-3 text-[12px] font-medium text-slate-400 transition">อัปโหลด</button>
            </div>

            <div class="p-6 min-h-[280px]">
                
                <div id="content-saved" class="space-y-3">
                    <p class="text-[11px] text-slate-500 mb-2">เลือกลายเซ็นที่คุณเคยใช้งานล่าสุด:</p>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative">
                            <input type="radio" name="saved_sig" id="sig1" value="https://upload.wikimedia.org/wikipedia/commons/7/7d/Signature_of_John_Hancock.svg" class="sig-option hidden" checked>
                            <label for="sig1" class="flex items-center justify-center h-24 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-blue-200 transition bg-white p-2">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Signature_of_John_Hancock.svg" class="max-h-full opacity-80 mix-blend-multiply">
                            </label>
                        </div>
                        <div class="relative">
                            <input type="radio" name="saved_sig" id="sig2" value="https://upload.wikimedia.org/wikipedia/commons/8/84/Signature_of_George_Washington.svg" class="sig-option hidden">
                            <label for="sig2" class="flex items-center justify-center h-24 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-blue-200 transition bg-white p-2">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Signature_of_George_Washington.svg" class="max-h-full opacity-80 mix-blend-multiply">
                            </label>
                        </div>
                    </div>
                </div>

                <div id="content-draw" class="hidden space-y-3 h-full">
                    <div class="relative border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 h-56 overflow-hidden">
                        <canvas id="canvas" class="w-full h-full cursor-crosshair touch-none"></canvas>
                        <div id="canvas-placeholder" class="absolute inset-0 flex items-center justify-center pointer-events-none text-slate-300 text-[12px]">วาดลายเซ็นของคุณที่นี่</div>
                        <button onclick="clearCanvas()" class="absolute top-2 right-2 bg-white border border-slate-200 text-[10px] px-2 py-1 rounded shadow-sm hover:text-red-500 transition">ล้างกระดาน</button>
                    </div>
                </div>

                <div id="content-upload" class="hidden h-full">
                    <label class="border-2 border-dashed border-slate-200 rounded-xl h-56 flex flex-col items-center justify-center bg-slate-50 cursor-pointer hover:bg-blue-50 transition">
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">
                        <div id="upload-preview-box" class="flex flex-col items-center">
                            <i class="fas fa-cloud-upload-alt text-4xl text-slate-300 mb-3"></i>
                            <span class="text-sm text-slate-500">เลือกไฟล์ลายเซ็น</span>
                        </div>
                        <img id="imgPreview" class="hidden max-h-48 rounded p-2 mix-blend-multiply">
                    </label>
                </div>
            </div>

            <div class="p-4 bg-slate-50 flex justify-end gap-2 border-t px-6">
                <button onclick="closeModal()" class="px-4 py-2 text-[13px] text-slate-500 font-medium">ยกเลิก</button>
                <button onclick="applySignature()" class="px-6 py-2 text-[13px] bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition">ตกลงและบันทึก</button>
            </div>
        </div>
    </div>

    <script>
        let currentTargetId = '';
        let canvas, ctx, isDrawing = false, hasDrawn = false;
        let activeTab = 'saved';

        function openModal(targetId) {
            currentTargetId = targetId;
            document.getElementById('modalOverlay').classList.remove('hidden');
            switchTab('saved'); // เริ่มต้นที่แท็บบันทึกไว้
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            clearCanvas();
            document.getElementById('imgPreview').classList.add('hidden');
            document.getElementById('upload-preview-box').classList.remove('hidden');
        }

        function switchTab(tab) {
            activeTab = tab;
            const tabs = ['saved', 'draw', 'upload'];
            tabs.forEach(t => {
                document.getElementById(`content-${t}`).classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                btn.classList.toggle('border-blue-600', t === tab);
                btn.classList.toggle('text-blue-600', t === tab);
                btn.classList.toggle('font-bold', t === tab);
                btn.classList.toggle('text-slate-400', t !== tab);
                btn.classList.toggle('font-medium', t !== tab);
            });

            if (tab === 'draw') setTimeout(initCanvas, 100);
        }

        function initCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e2b4d';

            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return [clientX - r.left, clientY - r.top];
            };

            const start = (e) => {
                isDrawing = true;
                hasDrawn = true;
                document.getElementById('canvas-placeholder').classList.add('hidden');
                ctx.beginPath();
                ctx.moveTo(...getPos(e));
            };

            const move = (e) => {
                if (!isDrawing) return;
                ctx.lineTo(...getPos(e));
                ctx.stroke();
            };

            const stop = () => isDrawing = false;

            canvas.onmousedown = start;
            canvas.onmousemove = move;
            window.onmouseup = stop;
            canvas.ontouchstart = start;
            canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
            canvas.ontouchend = stop;
        }

        function clearCanvas() {
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('canvas-placeholder').classList.remove('hidden');
            hasDrawn = false;
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('imgPreview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('upload-preview-box').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function applySignature() {
            const targetImg = document.getElementById(currentTargetId);
            
            if (activeTab === 'saved') {
                // จากรายการที่บันทึกไว้
                const selected = document.querySelector('input[name="saved_sig"]:checked');
                targetImg.src = selected.value;
            } 
            else if (activeTab === 'draw') {
                // จากการวาด
                if (!hasDrawn) return alert('กรุณาวาดลายเซ็นก่อนครับ');
                targetImg.src = canvas.toDataURL();
            } 
            else if (activeTab === 'upload') {
                // จากการอัปโหลด
                const uploadImg = document.getElementById('imgPreview');
                if (!uploadImg.src) return alert('กรุณาเลือกไฟล์ก่อนครับ');
                targetImg.src = uploadImg.src;
            }

            // เพิ่ม Animation เล็กน้อยเมื่อบันทึกเสร็จ
            targetImg.style.transform = 'scale(1.2)';
            setTimeout(() => targetImg.style.transform = 'scale(1)', 300);
            
            closeModal();
        }
    </script>
</body>
</html>
