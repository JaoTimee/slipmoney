<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการสลิปเงินเดือน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden text-slate-800 relative">

    <header class="md:hidden h-16 bg-[#1e2b4d] flex items-center px-6 shrink-0 z-30 shadow-sm justify-between">
        <div class="flex items-center">
            <button onclick="toggleSidebar()" class="text-white text-xl focus:outline-none mr-4 hover:text-slate-300 transition">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="font-bold text-white text-xl tracking-wide">Logo</h1>
        </div>
    </header>

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden md:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 z-50 w-64 md:w-56 bg-[#25396f] text-white flex flex-col h-full shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="h-16 md:h-20 flex items-center justify-between px-6 shrink-0 mt-2">
            <h1 class="font-bold text-white text-2xl tracking-wide hidden md:block">Logo</h1>
            <h1 class="font-bold text-white text-xl tracking-wide md:hidden">เมนู</h1>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white text-xl focus:outline-none">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto no-scrollbar px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-[#2563eb] text-white rounded-lg transition text-[13px] font-medium shadow-md">
                <i class="fas fa-money-bill-wave w-5 text-center"></i> รายการเงินเดือน
            </a>
            <a href="signature.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 text-white/80 hover:text-white rounded-lg transition text-[13px]">
                <i class="fas fa-signature w-5 text-center"></i> คำร้องขอลายเซ็น
            </a>
            <a href="edit_signature.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 text-white/80 hover:text-white rounded-lg transition text-[13px]">
                <i class="fas fa-edit w-5 text-center"></i> จัดการลายเซ็น
            </a>
        </nav>

        <div class="p-4 mb-4">
            <a href="../index.html" class="flex items-center gap-3 px-4 py-3 text-white/80 hover:text-white hover:bg-white/10 rounded-lg transition text-[13px]">
                <i class="fas fa-sign-out-alt w-5 text-center"></i> ออกจากระบบ
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#f4f7fa]">
        
        <header class="hidden md:flex h-16 bg-white border-b border-gray-200 px-6 py-4 justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-semibold text-gray-800">รายการสลิปเงินเดือน</h1>
            </div>
            <a href="profile.html" class="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition border border-slate-100">
                <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 font-bold flex items-center justify-center text-xs border border-blue-100">XX</div>
                <div class="leading-tight">
                    <p class="text-[13px] font-bold text-slate-800">xxxxxx</p>
                    <p class="text-[10px] text-slate-500">staff</p>
                </div>
            </a>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6">
            
            <div class="flex flex-wrap justify-between items-end mb-6 gap-4">
                <div class="flex flex-wrap gap-4 items-center">
                    <div>
                        <label class="block text-[12px] text-gray-600 mb-1">ประเภทหน่วยงาน</label>
                        <select id="orgSelect" class="border border-gray-300 rounded-lg px-3 py-2 text-[13px] w-full md:w-64 focus:outline-none focus:border-blue-500 bg-white" onchange="changeData()">
                            <option value="pao">อบจ. (องค์การบริหารส่วนจังหวัด)</option>
                            <option value="hospital">รพ.สต. (โรงพยาบาลส่งเสริมสุขภาพตำบล)</option>
                            <option value="school">โรงเรียน</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[12px] text-gray-600 mb-1">งวดเดือน</label>
                        <div class="flex gap-2">
                            <select id="monthSelect" class="border border-gray-300 rounded-lg px-3 py-2 text-[13px] focus:outline-none focus:border-blue-500 bg-white min-w-[120px]" onchange="changeData()">
                                <option value="" selected>ทั้งหมด</option>
                                <option value="01">มกราคม</option>
                                <option value="02">กุมภาพันธ์</option>
                                <option value="03">มีนาคม</option>
                                <option value="04">เมษายน</option>
                                <option value="05">พฤษภาคม</option>
                                <option value="06">มิถุนายน</option>
                                <option value="07">กรกฎาคม</option>
                                <option value="08">สิงหาคม</option>
                                <option value="09">กันยายน</option>
                                <option value="10">ตุลาคม</option>
                                <option value="11">พฤศจิกายน</option>
                                <option value="12">ธันวาคม</option>
                            </select>
                            <select id="yearInput" class="border border-gray-300 rounded-lg px-3 py-2 text-[13px] w-24 focus:outline-none focus:border-blue-500 bg-white" onchange="changeData()">
                                <option value="2569">2569</option>
                                <option value="2568">2568</option>
                                <option value="2567" selected>2567</option>
                                <option value="2566">2566</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[12px] text-gray-600 mb-1">ค้นหาชื่อพนักงาน</label>
                        <div class="relative">
                            <input type="text" id="searchInput" placeholder="กรอกชื่อ-สกุล..." class="border border-gray-300 rounded-lg px-3 py-2 text-[13px] w-full md:w-56 focus:outline-none focus:border-blue-500" oninput="changeData()">
                            <i class="fas fa-search absolute right-3 top-2.5 text-[12px] text-gray-400"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-5 rounded-xl border border-gray-200 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-xl"><i class="fas fa-users"></i></div>
                    <div>
                        <div class="text-[12px] text-gray-500">พนักงานทั้งหมด (ที่แสดง)</div>
                        <div class="text-2xl font-bold text-gray-800" id="stat-total">0 <span class="text-[13px] font-normal text-gray-500">คน</span></div>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-200 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-500 text-xl"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <div class="text-[12px] text-gray-500">สลิปที่นำเข้าแล้ว</div>
                        <div class="text-2xl font-bold text-gray-800" id="stat-imported">0 <span class="text-[13px] font-normal text-gray-500">คน</span></div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100">
                    <h2 class="text-[15px] font-bold text-gray-800">รายการสลิปเงินเดือน</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[13px] text-left text-gray-600 whitespace-nowrap">
                        <thead class="bg-slate-50 border-b border-gray-200 text-gray-500">
                            <tr>
                                <th class="px-4 py-3 text-center w-12"><input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"></th>
                                <th class="px-4 py-3 text-center font-medium w-16">ลำดับ</th>
                                <th class="px-4 py-3 font-medium">วัน/เดือน/ปี</th>
                                <th class="px-4 py-3 font-medium">ชื่อ-สกุล</th>
                                <th class="px-4 py-3 font-medium">ตำแหน่ง</th>
                                <th class="px-4 py-3 font-medium">ฝ่าย/แผนก</th>
                                <th class="px-4 py-3 font-medium text-right">รายการหัก (บาท)</th>
                                <th class="px-4 py-3 font-medium text-right">เงินเดือนสุทธิ (บาท)</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
                
                <div class="p-4 border-t border-gray-100 flex justify-between items-center text-[12px] text-gray-500 bg-white">
                    <div id="table-info">แสดง 0 รายการ</div>
                    <div class="flex gap-1 items-center">
                        <button class="w-7 h-7 flex items-center justify-center border border-gray-200 rounded hover:bg-gray-50 text-gray-400 transition"><i class="fas fa-chevron-left text-[10px]"></i></button>
                        <button class="w-7 h-7 flex items-center justify-center bg-blue-600 text-white rounded shadow-sm">1</button>
                        <button class="w-7 h-7 flex items-center justify-center border border-gray-200 rounded hover:bg-gray-50 transition">2</button>
                        <button class="w-7 h-7 flex items-center justify-center border border-gray-200 rounded hover:bg-gray-50 transition text-gray-400"><i class="fas fa-chevron-right text-[10px]"></i></button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        const database = {
            'pao': {
                data: [
                    { id: 'E01', date: '25/05/2567', name: 'นางสาวศิริวรรณ จันทร์ดี', pos: 'เจ้าหน้าที่บัญชี', dept: 'บัญชีและการเงิน', deduct: '500.00', sal: '29,800.00' },
                    { id: 'E02', date: '25/05/2567', name: 'นายกฤษฎา พงศ์พัฒน์', pos: 'เจ้าหน้าที่การตลาด', dept: 'การตลาด', deduct: '0.00', sal: '32,450.00' },
                    { id: 'E03', date: '25/04/2567', name: 'นางสาวจิราภรณ์ มณีวงศ์', pos: 'เจ้าหน้าที่ทรัพยากรบุคคล', dept: 'ทรัพยากรบุคคล', deduct: '750.00', sal: '27,900.00' },
                    { id: 'E04', date: '25/04/2567', name: 'นายธนวัฒน์ เจริญกิจ', pos: 'วิศวกร', dept: 'วิศวกรรม', deduct: '1,200.00', sal: '35,600.00' },
                    { id: 'E05', date: '25/06/2567', name: 'นางสาววรัญญา แสงทอง', pos: 'เจ้าหน้าที่ธุรการ', dept: 'อำนวยการ', deduct: '0.00', sal: '24,750.00' },
                    { id: 'E06', date: '25/05/2567', name: 'นางสาวธิดารัตน์ อินทร์คำ', pos: 'เจ้าหน้าที่จัดซื้อ', dept: 'จัดซื้อ', deduct: '0.00', sal: '26,150.00' }, 
                    { id: 'E07', date: '25/05/2567', name: 'นายวัชรพล กลิ่นหอม', pos: 'พนักงานขับรถ', dept: 'สนับสนุน', deduct: '300.00', sal: '18,900.00' }
                ]
            },
            'hospital': {
                data: [
                    { id: 'H01', date: '25/05/2567', name: 'นางสมศรี ใจดี', pos: 'พยาบาลวิชาชีพชำนาญการ', dept: 'บริการทางการแพทย์', deduct: '1,500.00', sal: '38,500.00' },
                    { id: 'H02', date: '25/04/2567', name: 'นายสมชาย รักสุขภาพ', pos: 'นักวิชาการสาธารณสุข', dept: 'ส่งเสริมสุขภาพ', deduct: '0.00', sal: '25,300.00' }
                ]
            },
            'school': {
                data: [
                    { id: 'S01', date: '25/05/2567', name: 'นายวิชาญ รักเรียน', pos: 'ผู้อำนวยการสถานศึกษา', dept: 'บริหารงานโรงเรียน', deduct: '2,500.00', sal: '45,800.00' }
                ]
            }
        };

        function changeData() {
            const org = document.getElementById('orgSelect').value;
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            const selectedMonth = document.getElementById('monthSelect').value;
            const selectedYear = document.getElementById('yearInput').value;
            
            const currentData = database[org] || { data: [] };
            
            const filteredData = currentData.data.filter(row => {
                const dateParts = row.date.split('/');
                const rowMonth = dateParts[1];
                const rowYear = dateParts[2];
                
                const matchName = row.name.toLowerCase().includes(searchKeyword);
                const matchMonth = selectedMonth === "" || rowMonth === selectedMonth;
                const matchYear = selectedYear === "" || rowYear === selectedYear;
                
                return matchName && matchMonth && matchYear;
            });
            
            document.getElementById('stat-total').innerHTML = `${filteredData.length} <span class="text-[13px] font-normal text-gray-500">คน</span>`;
            document.getElementById('stat-imported').innerHTML = `${filteredData.length} <span class="text-[13px] font-normal text-gray-500">คน</span>`; 

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลสลิปเงินเดือนที่ตรงกับเงื่อนไข</td></tr>`;
                document.getElementById('table-info').innerText = `แสดง 0 รายการ`;
                return;
            }

            filteredData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors';
                
                tr.innerHTML = `
                    <td class="px-4 py-3 text-center"><input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"></td>
                    <td class="px-4 py-3 text-center text-slate-500">${index + 1}</td>
                    <td class="px-4 py-3 text-gray-500">${row.date}</td>
                    <td class="px-4 py-3 font-medium">${row.name}</td>
                    <td class="px-4 py-3">${row.pos}</td>
                    <td class="px-4 py-3">${row.dept}</td>
                    <td class="px-4 py-3 text-right text-red-500">${row.deduct}</td>
                    <td class="px-4 py-3 text-right font-medium text-slate-800">${row.sal}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('table-info').innerText = `แสดง 1 - ${filteredData.length} จาก ${filteredData.length} รายการ`;
        }

        window.onload = changeData;
    </script>
</body>
</html>
